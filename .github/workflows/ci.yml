name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test and lint
    runs-on: windows-latest
    outputs:
      release_needed: ${{ steps.release.outputs.needed }}
      release_tag: ${{ steps.release.outputs.tag }}
      release_version: ${{ steps.release.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check
        shell: pwsh
        run: .\scripts\check.ps1

      - name: Check release
        id: release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $info = Get-Content .\cmd\dexgram\versioninfo.json -Raw | ConvertFrom-Json
          $version = [string]$info.StringFileInfo.ProductVersion
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "StringFileInfo.ProductVersion is empty."
          }
          if ($version -ne [string]$info.StringFileInfo.FileVersion) {
            throw "StringFileInfo.FileVersion does not match ProductVersion."
          }
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "ProductVersion must use MAJOR.MINOR.PATCH."
          }
          if ($info.FixedFileInfo.ProductVersion.Build -ne 0) {
            throw "FixedFileInfo.ProductVersion.Build must be 0 for MAJOR.MINOR.PATCH releases."
          }
          $fixed = "$($info.FixedFileInfo.ProductVersion.Major).$($info.FixedFileInfo.ProductVersion.Minor).$($info.FixedFileInfo.ProductVersion.Patch)"
          if ($version -ne $fixed) {
            throw "FixedFileInfo.ProductVersion does not match StringFileInfo.ProductVersion."
          }
          $fileFixed = "$($info.FixedFileInfo.FileVersion.Major).$($info.FixedFileInfo.FileVersion.Minor).$($info.FixedFileInfo.FileVersion.Patch)"
          if ($version -ne $fileFixed -or $info.FixedFileInfo.FileVersion.Build -ne 0) {
            throw "FixedFileInfo.FileVersion does not match ProductVersion."
          }

          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            "needed=false" >> $env:GITHUB_OUTPUT
            Write-Host "Release $tag already exists; skipping build and publish."
          } else {
            $remoteTag = git ls-remote --tags origin "refs/tags/$tag"
            if ($remoteTag) {
              throw "Tag $tag exists but no GitHub release exists."
            }
            "needed=true" >> $env:GITHUB_OUTPUT
          }

  release:
    name: Build and release
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test.outputs.release_needed == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check existing release
        id: existing_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.test.outputs.release_tag }}
        run: |
          gh release view $env:TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            "exists=true" >> $env:GITHUB_OUTPUT
            Write-Host "Release $env:TAG already exists; skipping build and publish."
          } else {
            "exists=false" >> $env:GITHUB_OUTPUT
          }

      - name: Build
        if: steps.existing_release.outputs.exists != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\dist | Out-Null
          go build -trimpath -ldflags="-s -w" -o .\dist\dexgram.exe .\cmd\dexgram
          $hash = (Get-FileHash .\dist\dexgram.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path .\dist\dexgram.exe.sha256 -Value "$hash  dexgram.exe"

      - name: Publish release
        if: steps.existing_release.outputs.exists != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.test.outputs.release_tag }}
          VERSION: ${{ needs.test.outputs.release_version }}
        run: |
          gh release view $env:TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $env:TAG already exists; skipping publish."
            exit 0
          }

          $createOutput = & gh release create $env:TAG `
            .\dist\dexgram.exe `
            .\dist\dexgram.exe.sha256 `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title "Dexgram $env:VERSION" `
            --notes "Automated release for Dexgram $env:VERSION." 2>&1
          $createExitCode = $LASTEXITCODE
          if ($createExitCode -eq 0) {
            $createOutput
            exit 0
          }

          $createText = ($createOutput | Out-String).Trim()
          if ($createText -match 'same tag name already exists') {
            gh release view $env:TAG --repo $env:GITHUB_REPOSITORY *> $null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Release $env:TAG was published by another workflow run; skipping publish."
              exit 0
            }
          }

          if (-not [string]::IsNullOrWhiteSpace($createText)) {
            Write-Error $createText
          }
          exit $createExitCode
